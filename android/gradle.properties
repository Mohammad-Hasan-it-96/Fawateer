org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Fix: Kotlin incremental compiler fails on Windows when project (D:) and
# pub cache/plugin sources (C:) are on different drives (IllegalArgumentException:
# "this and base files have different roots"). Disabling incremental compilation
# avoids the RelocatableFileToPathConverter cross-drive crash entirely.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false

